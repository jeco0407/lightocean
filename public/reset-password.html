<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重設密碼｜LUMEET 光遇</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;900&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="masthead">
  <div class="wrap">
    <a class="title" href="/"><b>LUMEET</b> 光遇</a>
  </div>
</div>
<div class="issue-line">FANS-TO-FANS RENTAL JOURNAL — VOL.01 / 2026</div>

<div class="auth-wrap">
  <div class="auth-card">
    <span class="no">RESET PASSWORD</span>
    <h1>設定新密碼</h1>
    <p class="sec-sub" style="padding-left:0;margin-bottom:20px" id="introMsg">請輸入你的新密碼。</p>

    <form id="resetForm">
      <div class="field"><label for="newPassword">新密碼</label><input type="password" id="newPassword" minlength="6" required></div>
      <div class="field"><label for="newPasswordConfirm">確認新密碼</label><input type="password" id="newPasswordConfirm" minlength="6" required></div>
      <button class="btn" type="submit" id="resetSubmit">更新密碼</button>
      <p class="form-note" id="resetMsg"></p>
    </form>
    <p class="form-note" id="invalidLinkMsg" style="display:none">這個重設密碼連結已失效或過期,請重新<a href="/auth.html">申請忘記密碼</a>。</p>
  </div>
</div>

<footer>
  <span class="fm">LUMEET — 光遇</span>
  粉絲互助租借媒合平台(MVP 測試中)・平台僅提供媒合資訊,交易細節請依平台規範進行。© 2026
  <div class="footer-links"><a href="/about">品牌故事</a> ・ <a href="/privacy.html">隱私權條款</a></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-client.js"></script>
<script>
const resetForm = document.getElementById('resetForm');
const resetMsg = document.getElementById('resetMsg');
const invalidLinkMsg = document.getElementById('invalidLinkMsg');

let recoveryReady = false;

supabaseClient.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && session)) {
    recoveryReady = true;
  }
});

// Supabase parses the recovery token from the URL asynchronously on load,
// so give it a moment before deciding the link is invalid.
setTimeout(async () => {
  if (recoveryReady) return;
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session) { recoveryReady = true; return; }
  resetForm.style.display = 'none';
  invalidLinkMsg.style.display = '';
}, 1500);

resetForm.addEventListener('submit', async e => {
  e.preventDefault();
  const password = document.getElementById('newPassword').value;
  const confirm = document.getElementById('newPasswordConfirm').value;

  if (password !== confirm) {
    resetMsg.textContent = '兩次輸入的密碼不一致。';
    return;
  }
  if (!recoveryReady) {
    resetMsg.textContent = '連結已失效,請重新申請忘記密碼。';
    return;
  }

  resetMsg.textContent = '處理中...';
  const { error } = await supabaseClient.auth.updateUser({ password });
  if (error) { resetMsg.textContent = error.message; return; }

  resetMsg.textContent = '密碼已更新!即將帶你前往登入頁。';
  setTimeout(() => { location.href = '/auth.html'; }, 1800);
});
</script>
</body>
</html>
