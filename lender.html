<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出租人資料｜手燈租借所 LIGHT OCEAN</title>
<meta name="description" content="查看出租人的刊登紀錄與租借口碑。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;900&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="masthead">
  <div class="wrap">
    <a class="title" href="index.html">LIGHT <b>OCEAN</b></a>
    <div class="masthead-right">
      <button class="hamburger" id="hamburgerBtn" type="button" aria-label="開啟選單" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav>
        <a href="items.html">RENTAL 找租借</a>
        <a href="index.html#flow">GUIDE 怎麼租</a>
        <a href="index.html#trust">TRUST 安心保障</a>
        <a href="items.html?action=list">LIST 我要出租</a>
      </nav>
      <div class="user-area" id="authArea"></div>
    </div>
  </div>
</div>
<div class="issue-line">FANS-TO-FANS RENTAL JOURNAL — VOL.01 / 2026</div>

<div class="wrap breadcrumb"><a href="index.html">首頁</a> / <a href="items.html">找租借</a> / <span id="crumbTitle">出租人資料</span></div>

<div id="notFound" class="wrap" style="display:none;padding:70px 0;text-align:center">
  <p class="sec-sub" style="padding-left:0">找不到這位出租人。</p>
  <a class="btn" href="items.html">回到找租借頁面</a>
</div>

<section id="lenderSection" style="display:none">
  <div class="wrap">
    <div class="lender-head">
      <div class="avatar-box" id="lenderAvatarBox"></div>
      <div>
        <h1 id="lenderName"></h1>
        <p class="meta" id="lenderRegion"></p>
        <p class="meta" id="lenderTrust"></p>
      </div>
    </div>

    <div class="sec-head" style="margin-top:40px"><span class="no">LISTINGS</span><h2>刊登中的裝備</h2></div>
    <div class="catalog" id="grid"></div>
    <p class="empty" id="empty">這位出租人目前沒有刊登中的裝備。</p>
  </div>
</section>

<footer>
  <span class="fm">LIGHT OCEAN — 手燈租借所</span>
  粉絲互助租借媒合平台(MVP 測試中)・平台僅提供媒合資訊,交易細節請依平台規範進行。© 2026
  <div class="footer-links"><a href="privacy.html">隱私權條款</a></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-client.js"></script>
<script src="data.js"></script>
<script src="auth-status.js"></script>
<script src="mobile-nav.js"></script>
<script>
(async () => {
  const lenderId=new URLSearchParams(location.search).get('id');
  if(!lenderId){
    document.getElementById('notFound').style.display='';
    return;
  }

  const [profile,listings,completedCount]=await Promise.all([
    fetchPublicProfile(lenderId),
    fetchLenderListings(lenderId),
    fetchLenderCompletedCount(lenderId),
  ]);

  if(!profile && !listings.length){
    document.getElementById('notFound').style.display='';
    return;
  }

  const name=profile?.display_name||'這位出租人';
  document.title=`${name}｜手燈租借所 LIGHT OCEAN`;
  document.getElementById('crumbTitle').textContent=name;
  document.getElementById('lenderSection').style.display='';
  document.getElementById('lenderName').textContent=name;
  document.getElementById('lenderRegion').textContent=profile?.home_region?`常出沒於 ${profile.home_region}`:'';
  document.getElementById('lenderTrust').textContent=completedCount>0?`✓ 已完成 ${completedCount} 次租借交易`:'尚無完成租借紀錄';

  document.getElementById('lenderAvatarBox').innerHTML=profile?.avatar
    ?`<img src="${profile.avatar}" alt="">`
    :`<span class="avatar-fallback-lg">🧑</span>`;

  const grid=document.getElementById('grid');
  const empty=document.getElementById('empty');
  grid.innerHTML=listings.map(l=>{
    const cover=l.image_url||l.products?.image_url;
    const iconContent=cover?`<img src="${cover}" alt="">`:(l.products?.icon||'📦');
    return `
    <a class="entry" href="item.html?id=${l.product_id}">
      <div class="icon">${iconContent}</div>
      <div>
        <span class="cat-label">${l.products?.label||''}</span>
        <h3>${l.products?.title||'(商品已下架)'}</h3>
        <div class="meta">${l.region}${l.meta?'・'+l.meta:''}</div>
      </div>
      <div class="pricing"><b>NT$${l.price}</b><small>per day / 日</small></div>
      <span class="btn" aria-hidden="true">查看 →</span>
    </a>`;
  }).join('');
  empty.style.display=listings.length?'none':'block';
})();
</script>
</body>
</html>
