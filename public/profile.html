<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會員資料｜光遇 LUMEET</title>
<meta name="description" content="編輯你的暱稱、頭像與常用地區,刊登與詢問表單會自動帶入這些資料。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;900&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="masthead">
  <div class="wrap">
    <a class="title" href="/">光遇 <b>LUMEET</b></a>
    <div class="masthead-right">
      <button class="hamburger" id="hamburgerBtn" type="button" aria-label="開啟選單" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav>
        <a href="/items">找租借</a>
        <a href="/#flow">怎麼租</a>
        <a href="/#trust">安心保障</a>
        <a href="/items?action=list">我要出租</a>
      </nav>
      <div class="user-area" id="authArea"></div>
    </div>
  </div>
</div>
<div class="issue-line">FANS-TO-FANS RENTAL JOURNAL — VOL.01 / 2026</div>

<div class="wrap breadcrumb"><a href="/">首頁</a> / 會員資料</div>

<section>
  <div class="wrap" style="max-width:560px">
    <div class="sec-head"><span class="no">MEMBER</span><h2>會員資料</h2></div>
    <p class="sec-sub" style="padding-left:0">這裡的暱稱與常用地區,會自動帶入刊登與詢問表單。</p>

    <form id="profileForm">
      <div class="field">
        <label>頭像</label>
        <div class="avatar-upload-row">
          <div class="avatar-preview" id="avatarPreviewWrap">
            <img id="avatarPreview" alt="頭像預覽" style="display:none">
            <span id="avatarPlaceholder">🧑</span>
          </div>
          <div>
            <input type="file" id="avatarFile" accept="image/*">
            <p class="form-note" style="margin-top:6px;text-align:left;padding-left:0">建議上傳正方形圖片,檔案小於 2MB。</p>
          </div>
        </div>
      </div>
      <div class="field"><label for="pfName">暱稱 / 顯示名稱</label><input id="pfName" placeholder="其他粉絲會看到這個名字"></div>
      <div class="field-row">
        <div class="field">
          <label for="pfBirth">出生年月日</label>
          <input type="date" id="pfBirth">
        </div>
        <div class="field">
          <label for="pfGender">性別</label>
          <select id="pfGender">
            <option value="">未設定</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label for="pfRegion">常用地區(縣市)</label>
        <select id="pfRegion">
          <option value="">未設定</option>
        </select>
      </div>
      <div class="field">
        <label for="pfBio">自我介紹(選填)</label>
        <textarea id="pfBio" maxlength="300" placeholder="讓其他粉絲多認識你一點,會顯示在你的出租人資料頁面"></textarea>
      </div>
      <button class="btn" type="submit">儲存變更</button>
      <p class="form-note" id="profileMsg"></p>
    </form>
  </div>
</section>

<footer>
  <span class="fm">LUMEET — 光遇</span>
  粉絲互助租借媒合平台(MVP 測試中)・平台僅提供媒合資訊,交易細節請依平台規範進行。© 2026
  <div class="footer-links"><a href="/privacy.html">隱私權條款</a></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-client.js"></script>
<script src="data.js"></script>
<script src="auth-status.js"></script>
<script src="mobile-nav.js"></script>
<script>
(async () => {
  await sessionReady;
  if(!currentUser){
    location.replace(`auth.html?next=${encodeURIComponent(location.pathname)}`);
    return;
  }

  const pfRegion=document.getElementById('pfRegion');
  const pfName=document.getElementById('pfName');
  const pfBirth=document.getElementById('pfBirth');
  const pfGender=document.getElementById('pfGender');
  const pfBio=document.getElementById('pfBio');
  const profileMsg=document.getElementById('profileMsg');
  const avatarFile=document.getElementById('avatarFile');
  const avatarPreview=document.getElementById('avatarPreview');
  const avatarPlaceholder=document.getElementById('avatarPlaceholder');
  let pendingAvatarFile=null;
  let currentAvatarUrl=null;

  pfRegion.innerHTML+=REGIONS.map(r=>`<option value="${r}">${r}</option>`).join('');
  pfGender.innerHTML+=GENDERS.map(g=>`<option value="${g.value}">${g.label}</option>`).join('');

  function showAvatar(url){
    if(url){
      avatarPreview.src=url;
      avatarPreview.style.display='';
      avatarPlaceholder.style.display='none';
    }else{
      avatarPreview.style.display='none';
      avatarPlaceholder.style.display='';
    }
  }

  avatarFile.addEventListener('change',()=>{
    const file=avatarFile.files[0];
    if(!file)return;
    if(file.size>2*1024*1024){
      profileMsg.textContent='圖片檔案請小於 2MB';
      avatarFile.value='';
      return;
    }
    pendingAvatarFile=file;
    showAvatar(URL.createObjectURL(file));
  });

  const profile=await fetchProfile(currentUser.id);
  if(profile){
    pfName.value=profile.display_name||'';
    pfRegion.value=profile.home_region||'';
    pfBirth.value=profile.birth_date||'';
    pfGender.value=profile.gender||'';
    pfBio.value=profile.bio||'';
    currentAvatarUrl=profile.avatar||null;
    showAvatar(currentAvatarUrl);
  }else{
    showAvatar(null);
  }

  document.getElementById('profileForm').addEventListener('submit',async e=>{
    e.preventDefault();
    profileMsg.textContent='儲存中...';
    try{
      let avatarUrl=currentAvatarUrl;
      if(pendingAvatarFile){
        avatarUrl=await uploadAvatar(pendingAvatarFile);
      }
      await upsertProfile({
        displayName:pfName.value.trim(),
        avatar:avatarUrl,
        homeRegion:pfRegion.value,
        birthDate:pfBirth.value,
        gender:pfGender.value,
        bio:pfBio.value.trim(),
      });
      currentAvatarUrl=avatarUrl;
      pendingAvatarFile=null;
      profileMsg.textContent='已儲存!';
      renderAuthArea();
    }catch(err){
      profileMsg.textContent=`儲存失敗:${err.message}`;
    }
  });
})();
</script>
</body>
</html>
